name: truthful-attribution-gate
# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci),
# per the ratified org truthful-attribution spec. WARN mode (advisory rollout):
# findings are annotated, the check is ALWAYS green — it never fails a PR. No
# .github/gate-suite.json is committed here (WARN scope exercises presence + the
# human arm; the gate-suite arm is not exercised without a committed suite). This
# caller is NOT a required status check and adds no branch-protection change.
# Pinned to an immutable, reviewed cinatra-ai/ci workflow SHA (ci `main` HEAD,
# one commit ahead of the v0.1.0 tag) — so no `# v0.1.0` marker comment is used
# on the `uses:` line (it would be false version metadata).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  # actions:read is MANDATORY: the reusable engine resolves a reusable-workflow
  # check-run to its Actions run (GET /actions/runs/{id}) to verify referenced_workflows[]
  # at the pinned SHA. With an explicit permissions block, any omitted scope defaults
  # to `none`, and a called reusable workflow cannot exceed the caller's grant — so
  # omitting this causes startup_failure (red/missing check), which WARN mode CANNOT
  # rescue (it fails before any step runs). Do not drop this line.
  actions: read

jobs:
  truthful-attribution-gate:                 # caller job id MUST stay this exact string
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@8eede1022e835997d94974e4bd6205daf72131a2
    with:
      mode: warn
      ref: 8eede1022e835997d94974e4bd6205daf72131a2
